<script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    mediumZoom(".post-content img", {
      margin: 24,
      background: "rgba(0, 0, 0, 0.85)",
    });

    const sidebar = document.querySelector(".post-toc-sidebar");
    if (!sidebar) return;

    const links = [...sidebar.querySelectorAll("[data-toc-link]")];
    if (!links.length) return;

    // Mobile: toggle collapse
    const title = sidebar.querySelector(".toc-nav-title");
    if (title && window.matchMedia("(max-width: 1099px)").matches) {
      title.addEventListener("click", () => sidebar.classList.toggle("is-open"));
    }

    // Scroll spy: highlight current section
    const headings = links
      .map((a) => document.querySelector(a.getAttribute("href")))
      .filter(Boolean);

    const setActive = (id) => {
      links.forEach((a) => {
        a.classList.toggle("is-active", a.getAttribute("href") === "#" + id);
      });
    };

    const observer = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter((e) => e.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        if (visible.length) setActive(visible[0].target.id);
      },
      { rootMargin: "-20% 0px -70% 0px", threshold: 0 }
    );

    headings.forEach((h) => observer.observe(h));
    if (headings.length) setActive(headings[0].id);
  });
</script>
